RandomForest:
  n_estimators:
    min: 100
    max: 400

  max_depth:
    min: 5
    max: 20

  min_samples_split:
    min: 2
    max: 10

  min_samples_leaf:
    min: 1
    max: 5

  max_features:
    - sqrt
    - log2

  criterion:
    - gini
    - entropy

  bootstrap:
    - true

  class_weight:
    - balanced
    - balanced_subsample

XGBoost:
  n_estimators:
    min: 100
    max: 500

  learning_rate:
    min: 0.01
    max: 0.3
    log: true

  max_depth:
    min: 3
    max: 10

  min_child_weight:
    min: 1
    max: 10

  gamma:
    min: 0.0
    max: 5.0

  subsample:
    min: 0.6
    max: 1.0

  colsample_bytree:
    min: 0.6
    max: 1.0

  reg_alpha:
    min: 0.0
    max: 10.0

  reg_lambda:
    min: 0.1
    max: 20.0
    log: true

  objective:
    - multi:softprob

  eval_metric:
    - mlogloss

  tree_method:
    - hist

  grow_policy:
    - depthwise

  booster:
    - gbtree

LightGBM:
  n_estimators:
    min: 100
    max: 500

  learning_rate:
    min: 0.01
    max: 0.3
    log: true

  max_depth:
    min: 1
    max: 15

  num_leaves:
    min: 15
    max: 255

  min_child_samples:
    min: 5
    max: 100

  min_child_weight:
    min: 0.001
    max: 10
    log: true

  subsample:
    min: 0.6
    max: 1.0

  subsample_freq:
    min: 0
    max: 10

  colsample_bytree:
    min: 0.6
    max: 1.0

  reg_alpha:
    min: 0.0
    max: 10.0

  reg_lambda:
    min: 0.1
    max: 20.0
    log: true

  min_split_gain:
    min: 0.0
    max: 5.0

  objective:
    - multiclass

  boosting_type:
    - gbdt

  class_weight:
    - balanced
    - null

  verbosity:
    - -1

CatBoost:
  iterations:
    min: 100
    max: 500

  learning_rate:
    min: 0.01
    max: 0.3
    log: true

  depth:
    min: 4
    max: 10

  l2_leaf_reg:
    min: 1.0
    max: 10.0

  random_strength:
    min: 0.0
    max: 10.0

  bagging_temperature:
    min: 0.0
    max: 5.0

  border_count:
    min: 32
    max: 255

  grow_policy:
    - SymmetricTree
    - Depthwise

  bootstrap_type:
    - Bayesian

  subsample:
    min: 0.6
    max: 1.0

  objective:
    - MultiClass

  eval_metric:
    - TotalF1

  auto_class_weights:
    - Balanced
    - null

  verbose:
    - false


  